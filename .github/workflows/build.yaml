name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - hotfix/**
      - feature/**
      - fix/**
      - release/**
    tags:
      - v*.*.*
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf \
            automake \
            autopoint \
            build-essential \
            clang \
            gettext \
            libgmp-dev \
            libgnutls28-dev \
            liblz4-dev \
            libp11-kit-dev \
            libssl-dev \
            libtspi-dev \
            libtool \
            libxml2-dev \
            nettle-dev \
            patch \
            pkg-config \
            zlib1g-dev

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.89 --profile minimal --component rustfmt --component clippy
          rustup default 1.89

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/git/db/
            ~/.cargo/registry/cache/
            ~/.cargo/registry/index/
            target/
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml', '.gitmodules') }}
          restore-keys: |
            rust-${{ runner.os }}-

      - name: Check formatting
        run: cargo fmt --check

      - name: Run unit tests
        run: cargo test -p common -p auth -p gpapi

      - name: Check CLI/service crates
        run: cargo check -p gpclient -p gpauth -p gpservice --no-default-features

      - name: Run clippy
        run: cargo clippy -p gpclient -p gpauth -p gpservice --no-default-features --all-targets -- -D warnings

  shell:
    name: Shell scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck

      - name: Run shellcheck
        shell: bash
        run: |
          shellcheck \
            --severity=error \
            scripts/*.sh \
            packaging/files/usr/lib/NetworkManager/dispatcher.d/gpclient-nm-hook \
            packaging/files/usr/lib/NetworkManager/dispatcher.d/pre-down.d/gpclient.down \
            packaging/files/usr/libexec/gpclient/hipreport.sh \
            packaging/files/usr/libexec/gpclient/vpnc-script

  package-smoke:
    name: Binary package smoke test
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf \
            automake \
            autopoint \
            build-essential \
            clang \
            gettext \
            libgmp-dev \
            libgnutls28-dev \
            liblz4-dev \
            libp11-kit-dev \
            libssl-dev \
            libtspi-dev \
            libtool \
            libxml2-dev \
            nettle-dev \
            patch \
            pkg-config \
            zlib1g-dev

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.89 --profile minimal
          rustup default 1.89

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/git/db/
            ~/.cargo/registry/cache/
            ~/.cargo/registry/index/
            target/
          key: package-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml', '.gitmodules') }}
          restore-keys: |
            package-${{ runner.os }}-

      - name: Build binary package
        run: make binary INCLUDE_GUI=0 BUILD_GUI_HELPER=0

      - name: Verify packaged CLIs
        run: |
          pkg_dir="$(find .build/binary -mindepth 1 -maxdepth 1 -type d -name 'globalprotect-openconnect_*' | head -n1)"
          test -n "$pkg_dir"
          "$pkg_dir/artifacts/usr/bin/gpclient" --help
          "$pkg_dir/artifacts/usr/bin/gpauth" --help
          "$pkg_dir/artifacts/usr/bin/gpservice" --help

      - name: Upload package smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-smoke-${{ runner.os }}
          if-no-files-found: error
          path: |
            .build/binary/*.tar.xz
            .build/binary/*.sha256
