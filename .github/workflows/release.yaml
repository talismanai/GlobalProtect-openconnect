name: Release

on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to release, for example v2.5.4
        required: true
      prerelease:
        description: Mark the GitHub release as a prerelease
        type: boolean
        required: true
        default: false
      draft:
        description: Create the GitHub release as a draft
        type: boolean
        required: true
        default: false

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      deb_version: ${{ steps.release.outputs.deb_version }}
      package_version: ${{ steps.release.outputs.package_version }}
    steps:
      - name: Resolve release metadata
        id: release
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          tag="${INPUT_TAG:-$REF_NAME}"
          version="${tag#v}"
          deb_version="${version//-/+}"
          package_version="${version//-/.}"

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "deb_version=$deb_version" >> "$GITHUB_OUTPUT"
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"

  source:
    name: Source tarballs
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          submodules: recursive

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.89 --profile minimal
          rustup default 1.89

      - name: Build source tarball
        run: |
          mkdir -p dist
          make tarball
          cp .build/tarball/*.tar.gz dist/

      - name: Build offline source tarball
        run: |
          make tarball OFFLINE=1
          for file in .build/tarball/*.tar.gz; do
            base="$(basename "$file" .tar.gz)"
            cp "$file" "dist/${base}.offline.tar.gz"
          done

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS-source.txt

      - name: Upload source artifacts
        uses: actions/upload-artifact@v4
        with:
          name: source
          if-no-files-found: error
          path: dist/*

  linux-binaries:
    name: Linux binaries (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf \
            automake \
            autopoint \
            build-essential \
            clang \
            gettext \
            libgmp-dev \
            libgnutls28-dev \
            liblz4-dev \
            libp11-kit-dev \
            libssl-dev \
            libtspi-dev \
            libtool \
            libxml2-dev \
            nettle-dev \
            patch \
            pkg-config \
            zlib1g-dev

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.89 --profile minimal
          rustup default 1.89

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/git/db/
            ~/.cargo/registry/cache/
            ~/.cargo/registry/index/
            target/
          key: release-${{ matrix.arch }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml', '.gitmodules') }}
          restore-keys: |
            release-${{ matrix.arch }}-

      - name: Build release binaries
        run: cargo build --release -p gpclient -p gpauth -p gpservice --no-default-features

      - name: Package binaries
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          pkg="globalprotect-openconnect_${VERSION}_${ARCH}"
          mkdir -p "dist/$pkg"
          install -m 0755 target/release/gpclient "dist/$pkg/gpclient"
          install -m 0755 target/release/gpauth "dist/$pkg/gpauth"
          install -m 0755 target/release/gpservice "dist/$pkg/gpservice"
          install -m 0644 LICENSE "dist/$pkg/LICENSE"
          install -m 0644 README.md "dist/$pkg/README.md"
          tar -C dist -cJf "dist/${pkg}.bin.tar.xz" "$pkg"
          sha256sum "dist/${pkg}.bin.tar.xz" > "dist/${pkg}.bin.tar.xz.sha256"

      - name: Verify CLIs
        run: |
          target/release/gpclient --help
          target/release/gpauth --help
          target/release/gpservice --help

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            dist/*.bin.tar.xz
            dist/*.sha256

  binary-package:
    name: Binary package (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf \
            automake \
            autopoint \
            build-essential \
            clang \
            gettext \
            libgmp-dev \
            libgnutls28-dev \
            liblz4-dev \
            libp11-kit-dev \
            libssl-dev \
            libtspi-dev \
            libtool \
            libxml2-dev \
            nettle-dev \
            patch \
            pkg-config \
            zlib1g-dev

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.89 --profile minimal
          rustup default 1.89

      - name: Build installable binary package
        run: make binary INCLUDE_GUI=0 BUILD_GUI_HELPER=0

      - name: Rename package with release architecture
        run: |
          mkdir -p dist
          for file in .build/binary/*.tar.xz; do
            base="$(basename "$file" .bin.tar.xz)"
            cp "$file" "dist/${base}.tar.xz"
          done
          cd dist
          sha256sum *.tar.xz > "SHA256SUMS-package-${{ matrix.arch }}.txt"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-package-${{ matrix.arch }}
          if-no-files-found: error
          path: dist/*

  distro-packages:
    name: Distro package (${{ matrix.package }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: deb
            target: deb
            builder: deb-builder-tauri2
            runner: ubuntu-latest
            arch: x86_64
            version: deb
            artifacts: |
              .build/deb/*.deb
              .build/deb/*.ddeb
              .build/deb/*.buildinfo
              .build/deb/*.changes
          - package: rpm
            target: rpm
            builder: rpm-builder-tauri2
            runner: ubuntu-latest
            arch: x86_64
            version: package
            artifacts: |
              .build/rpm/*.rpm
          - package: pkg
            target: pkgbuild
            builder: pkg-builder-tauri2
            runner: ubuntu-latest
            arch: x86_64
            version: package
            artifacts: |
              .build/pkgbuild/*.pkg.tar.zst
          - package: apk
            target: apk
            builder: apk-builder-tauri2
            runner: ubuntu-latest
            arch: x86_64
            version: package
            artifacts: |
              .build/apk/*.apk
          - package: deb
            target: deb
            builder: deb-builder-tauri2
            runner: ubuntu-24.04-arm
            arch: aarch64
            version: deb
            artifacts: |
              .build/deb/*.deb
              .build/deb/*.ddeb
              .build/deb/*.buildinfo
              .build/deb/*.changes
          - package: rpm
            target: rpm
            builder: rpm-builder-tauri2
            runner: ubuntu-24.04-arm
            arch: aarch64
            version: package
            artifacts: |
              .build/rpm/*.rpm
          - package: pkg
            target: pkgbuild
            builder: pkg-builder-tauri2
            runner: ubuntu-24.04-arm
            arch: aarch64
            version: package
            artifacts: |
              .build/pkgbuild/*.pkg.tar.zst
          - package: apk
            target: apk
            builder: apk-builder-tauri2
            runner: ubuntu-24.04-arm
            arch: aarch64
            version: package
            artifacts: |
              .build/apk/*.apk
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          submodules: recursive

      - name: Build ${{ matrix.package }} package
        env:
          DEB_VERSION: ${{ needs.prepare.outputs.deb_version }}
          PACKAGE_VERSION: ${{ needs.prepare.outputs.package_version }}
        run: |
          version="$PACKAGE_VERSION"
          if [[ "${{ matrix.version }}" == "deb" ]]; then
            version="$DEB_VERSION"
          fi

          chmod -R a+rwX "$PWD"
          docker run --pull=always --rm \
            -e COREPACK_INTEGRITY_KEYS=0 \
            -e LIBXML2_STATIC=1 \
            -v "$PWD:/workspace" \
            -w /workspace \
            "yuezk/gpdev:${{ matrix.builder }}" \
            sh -lc "
              run_as_root() {
                if [ \"\$(id -u)\" = 0 ]; then
                  \"\$@\"
                elif command -v sudo >/dev/null 2>&1; then
                  sudo \"\$@\"
                else
                  \"\$@\"
                fi
              }

              if command -v apt-get >/dev/null 2>&1; then
                run_as_root apt-get update
                run_as_root apt-get install -y --no-install-recommends libtspi-dev
              elif command -v dnf >/dev/null 2>&1; then
                run_as_root dnf install -y trousers-devel
              elif command -v zypper >/dev/null 2>&1; then
                run_as_root zypper --non-interactive install trousers-devel
              elif command -v pacman >/dev/null 2>&1; then
                run_as_root pacman -Sy --noconfirm --needed trousers
              elif command -v apk >/dev/null 2>&1; then
                run_as_root apk add --no-cache trousers-dev
              fi

              make ${{ matrix.target }} VERSION='$version' REVISION=1 INCLUDE_GUI=0 BUILD_GUI_HELPER=0 LIBXML2_STATIC=1
            "
          sudo chown -R "$USER:$USER" .build

      - name: Collect ${{ matrix.package }} artifacts
        env:
          PACKAGE: ${{ matrix.package }}
          ARCH: ${{ matrix.arch }}
          ARTIFACTS: ${{ matrix.artifacts }}
        run: |
          mkdir -p "dist/$PACKAGE-$ARCH"
          shopt -s nullglob
          while IFS= read -r pattern; do
            [[ -z "$pattern" ]] && continue
            files=( $pattern )
            if [[ "${#files[@]}" -gt 0 ]]; then
              cp "${files[@]}" "dist/$PACKAGE-$ARCH/"
            fi
          done <<< "$ARTIFACTS"
          test "$(find "dist/$PACKAGE-$ARCH" -type f | wc -l)" -gt 0
          cd "dist/$PACKAGE-$ARCH"
          sha256sum * > "SHA256SUMS-${PACKAGE}-${ARCH}.txt"

      - name: Upload ${{ matrix.package }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: distro-${{ matrix.package }}-${{ matrix.arch }}
          if-no-files-found: error
          path: dist/${{ matrix.package }}-${{ matrix.arch }}/*

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - source
      - linux-binaries
      - binary-package
      - distro-packages
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate combined checksums
        working-directory: release-artifacts
        run: |
          find . -maxdepth 1 -type f ! -name 'SHA256SUMS*' -print0 \
            | sort -z \
            | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          draft: ${{ inputs.draft || false }}
          prerelease: ${{ inputs.prerelease || contains(needs.prepare.outputs.tag, '-') }}
          fail_on_unmatched_files: true
          overwrite_files: true
          files: release-artifacts/*
